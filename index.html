<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Stair Birthday Scroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stairs" aria-label="Birthday stair-step message">
      <section class="step step-1" data-step>
        <div class="content">HAPPY</div>
      </section>
      <section class="step step-2" data-step>
        <div class="content">BIRTHDAY</div>
      </section>
      <section class="step step-3" data-step>
        <div class="content">TO YOU</div>
      </section>
      <section class="step step-4" data-step>
        <div class="content">ALEX</div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
